venue:
  name: BINANCE
  account_type: MARGIN
  oms_type: NETTING
  starting_balances:
    - amount: 1000
      currency: USDT

strategy:
  module: strategy
  class: RegimeSwitchStrategy
  config_class: RegimeSwitchConfig
  config:
    order_id_tag: "001"
    leverage: 3
    margin_budget: "100"
    adx_period: 14
    atr_period: 14
    ema_trend_period: 200
    donchian_period: 20
    adx_enter: 22.0
    adx_exit: 18.0
    vol_riskoff: 0.015
    atr_stop_mult: 2.0
    atr_trail_mult: 3.0
    cooldown_bars: 12
    breaker_dd: 0.15
    breaker_cooldown: 48
    ref_vol: 0.010
    taker_fee: 0.0005

instrument:
  id: BTCUSDT.BINANCE
  kind: perpetual
  raw_symbol: BTCUSDT
  base_currency: BTC
  quote_currency: USDT
  settlement_currency: USDT
  price_precision: 2
  size_precision: 3
  price_increment: "0.01"
  size_increment: "0.001"
  lot_size: "0.001"
  maker_fee: "0.0002"
  taker_fee: "0.0005"
  bar_type: BTCUSDT.BINANCE-1-HOUR-LAST-EXTERNAL
