
name: Live paper trading

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: live-trading
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run live paper-trading loop
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node live/live-trade.js
      - name: Commit updated state
        run: |
          git config user.name "rising-live-bot"
          git config user.email "actions@github.com"
          git add public/live-state.json
          if git diff --staged --quiet; then
            echo "no state change"
          else
            git commit -m "live: update paper-trading state [skip ci]"
            git push
          fi
